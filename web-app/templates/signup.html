{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}
{% extends "base.html" %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Start your digital diary.</p>

    {% if error %}
      <p class="error-text">{{ error }}</p>
    {% endif %}

    <form class="form" method="post">
      <input class="field" name="email" type="email" placeholder="Email Address" required />
      <input class="field" name="username" placeholder="Username" required />
      <input class="field" name="password" type="password" placeholder="Password" required />

      <button class="btn">Create Account</button>
      <a href="{{ url_for('login') }}" class="btn btn-secondary">Back to Sign In</a>
    </form>

  </div>
</div>
{% endblock %}
