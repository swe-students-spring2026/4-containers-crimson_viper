{% extends "base.html" %}
{% block content %}

<div class="screen">

  <header class="hero">
    <h1>Login</h1>
  </header>

  <form class="form" method="post">
    {% if error %}
      <div class="error-text">{{ error }}</div>
    {% endif %}
    <input class="field" name="email" type="email" placeholder="Email Address" required />
    <input class="field" name="password" type="password" placeholder="Password" required />

    <button class="btn">Sign In</button>
    <a href="{{ url_for('signup') }}" class="btn-secondary">Create Account</a>
  </form>
</div>
{% endblock %}
